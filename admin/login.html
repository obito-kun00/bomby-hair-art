<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Bombay Hair Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black:   #0a0a0a;
      --card:    #161616;
      --border:  #1e1e1e;
      --gold:    #c9a84c;
      --gold-lt: #f0c040;
      --white:   #ffffff;
      --muted:   #888888;
      --error:   #e05555;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold);
    }
    .login-logo h1 span { color: var(--white); }
    .login-logo p {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }
    .login-card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }
    .form-control {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      background: none;
      border: none;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--gold); }
    .error-msg {
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--error);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a07830, var(--gold), var(--gold-lt));
      color: var(--black);
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.35);
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .back-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .back-link a { color: var(--gold); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, #a07830, var(--gold-lt));
      border-radius: 2px;
      margin: 0 auto 32px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1>Bombay <span>Hair Art</span></h1>
      <p>Admin Panel</p>
      <div class="divider"></div>
    </div>

    <div class="login-card">
      <h2>Welcome back</h2>
      <p>Sign in to manage appointments and messages.</p>

      <div id="error-msg" class="error-msg" style="display:none;">
        <i class="fas fa-exclamation-circle"></i>
        <span id="error-text">Invalid username or password.</span>
      </div>

      <form id="login-form" method="POST" action="/admin/login">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Enter username" required autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Enter password" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Toggle password">
              <i class="fas fa-eye" id="pw-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="login-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
    </div>

    <div class="back-link">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>

  <script>
    function togglePw() {
      const pw   = document.getElementById('password');
      const icon = document.getElementById('pw-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    // Show error if URL has ?error=1
    if (new URLSearchParams(window.location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'flex';
    }

    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    });
  </script>
</body>
</html>
