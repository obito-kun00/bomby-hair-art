databases:
  - name: bombay-hair-art-db
    databaseName: bombayhairart
    user: bombayhairart
    plan: free

services:
  - type: web
    name: bombay-hair-art
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bombay-hair-art-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: BombayHairArt@2024
      - key: PYTHON_VERSION
        value: 3.11.0
